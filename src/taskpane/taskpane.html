<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quran in Word Mac</title>

    <!-- Office JavaScript API -->
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- Fluent UI -->
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>

    <!-- Add-in styles -->
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body class="ms-Fabric">
    <header class="header">
        <h1 class="header__title ms-font-l">Quran in Word <span class="header__platform">(for Mac)</span></h1>
        <p class="header__subtitle ms-font-s">Insert Quranic verses into your document</p>
    </header>

    <section id="sideload-msg" class="sideload-msg">
        <p class="ms-font-m">Please <a target="_blank" href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing">sideload</a> your add-in to see the app.</p>
    </section>

    <main id="app-body" class="app-body" style="display: none;">
        <!-- Surah Selector -->
        <div class="form-group">
            <label class="ms-font-m form-label">Surah</label>
            <div class="surah-search-wrap">
                <input type="text" id="surah-search" class="form-control" placeholder="Search for surah name" autocomplete="off" />
                <input type="hidden" id="surah-value" value="1" />
                <div id="surah-dropdown" class="surah-dropdown"></div>
            </div>
        </div>

        <!-- Mode Toggle -->
        <div class="form-group">
            <div class="mode-toggle">
                <label class="mode-option">
                    <input type="radio" name="insert-mode" value="single" checked />
                    <span class="mode-label">Single Ayah</span>
                </label>
                <label class="mode-option">
                    <input type="radio" name="insert-mode" value="range" />
                    <span class="mode-label">Ayah Range</span>
                </label>
            </div>
        </div>

        <!-- Single Ayah Mode -->
        <div id="single-mode" class="form-group">
            <div class="ayah-range-row">
                <div class="ayah-input-group">
                    <span class="ayah-input-label">Ayah</span>
                    <input type="number" id="ayah-single" class="form-control ayah-input" min="1" value="1" />
                </div>
                <span id="ayah-total-single" class="ms-font-s ayah-range">/ 7</span>
            </div>
            <label class="checkbox-label ms-font-s" style="margin-top: 6px;">
                <input type="checkbox" id="chk-show-ayah-number" checked />
                Show ayah number
            </label>
        </div>

        <!-- Range Mode -->
        <div id="range-mode" class="form-group" style="display: none;">
            <div class="ayah-range-row">
                <div class="ayah-input-group">
                    <span class="ayah-input-label">From</span>
                    <input type="number" id="ayah-from" class="form-control ayah-input" min="1" value="1" />
                </div>
                <span class="ayah-separator">&ndash;</span>
                <div class="ayah-input-group">
                    <span class="ayah-input-label">To</span>
                    <input type="number" id="ayah-to" class="form-control ayah-input" min="1" value="7" />
                </div>
                <span id="ayah-range" class="ms-font-s ayah-range">/ 7</span>
            </div>
            <div class="layout-toggle">
                <label class="layout-option">
                    <input type="radio" name="range-layout" value="continuous" checked />
                    <span class="layout-label">Continuous</span>
                </label>
                <label class="layout-option">
                    <input type="radio" name="range-layout" value="per-line" />
                    <span class="layout-label">One ayah per line</span>
                </label>
            </div>
            <label class="checkbox-label ms-font-s" style="margin-top: 6px;">
                <input type="checkbox" id="chk-show-ayah-number-range" checked />
                Show ayah number
            </label>
        </div>

        <!-- Translation Languages -->
        <div class="form-group">
            <label class="ms-font-m form-label">Translations</label>
            <div id="active-languages" class="language-chips"></div>
            <div class="language-add-wrap">
                <button type="button" id="btn-add-language" class="language-add-btn">+ Add Translation</button>
                <div id="language-dropdown" class="language-dropdown"></div>
            </div>
        </div>

        <!-- Insert Button -->
        <button id="btn-insert" class="ms-Button ms-Button--primary insert-btn">
            <span class="ms-Button-label">Insert to Word</span>
        </button>

        <!-- Status -->
        <p id="status" class="ms-font-s status"></p>

        <!-- Footer -->
        <p class="author">Free &amp; open source. Works offline.</p>
    </main>
</body>

</html>
