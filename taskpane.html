<!doctype html><html><head><meta charset="UTF-8"/><meta http-equiv="X-UA-Compatible" content="IE=Edge"/><meta name="viewport" content="width=device-width,initial-scale=1"><title>Quran in Word Mac</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/><link href="/quran_mac_word/65a547d5e75023909332.css" rel="stylesheet"/><script defer="defer" src="/quran_mac_word/polyfill.js"></script><script defer="defer" src="/quran_mac_word/taskpane.js"></script></head><body class="ms-Fabric"><header class="header"><h1 class="header__title ms-font-l">Quran in Word Mac</h1><p class="header__subtitle ms-font-s">Insert Quranic verses into your document</p></header><section id="sideload-msg" class="sideload-msg"><p class="ms-font-m">Please <a target="_blank" href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing">sideload</a> your add-in to see the app.</p></section><main id="app-body" class="app-body" style="display:none"><div class="form-group"><label for="surah-select" class="ms-font-m form-label">Surah</label> <select id="surah-select" class="form-control"></select></div><div class="form-group"><div class="mode-toggle"><label class="mode-option"><input type="radio" name="insert-mode" value="single" checked="checked"/> <span class="mode-label">Single Ayah</span></label> <label class="mode-option"><input type="radio" name="insert-mode" value="range"/> <span class="mode-label">Ayah Range</span></label></div></div><div id="single-mode" class="form-group"><div class="ayah-range-row"><div class="ayah-input-group"><span class="ayah-input-label">Ayah</span> <input type="number" id="ayah-single" class="form-control ayah-input" min="1" value="1"/></div><span id="ayah-total-single" class="ms-font-s ayah-range">/ 7</span></div><label class="checkbox-label ms-font-s" style="margin-top:6px"><input type="checkbox" id="chk-show-ayah-number" checked="checked"/> Show ayah number</label></div><div id="range-mode" class="form-group" style="display:none"><div class="ayah-range-row"><div class="ayah-input-group"><span class="ayah-input-label">From</span> <input type="number" id="ayah-from" class="form-control ayah-input" min="1" value="1"/></div><span class="ayah-separator">&ndash;</span><div class="ayah-input-group"><span class="ayah-input-label">To</span> <input type="number" id="ayah-to" class="form-control ayah-input" min="1" value="7"/></div><span id="ayah-range" class="ms-font-s ayah-range">/ 7</span></div></div><div class="form-group"><label class="ms-font-m form-label">Translations</label><div class="checkbox-group"><label class="checkbox-label ms-font-s"><input type="checkbox" id="chk-english"/> English (Sahih International)</label> <label class="checkbox-label ms-font-s"><input type="checkbox" id="chk-indonesian" checked="checked"/> Bahasa Indonesia</label></div></div><button id="btn-insert" class="ms-Button ms-Button--primary insert-btn"><span class="ms-Button-label">Insert to Word</span></button><p id="status" class="ms-font-s status"></p></main></body></html>
